<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Le Lounge - Topic</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <img src="/assets/lounge-banner.png" alt="Le Lounge" style="height: 60px; width: auto" />
      </a>

      <nav class="main-nav">
        <a href="/" class="nav-link">Accueil</a>
        <a href="/topics" class="nav-link">Topics</a>
        <a href="/help" class="nav-link">Aide</a>
        <a href="/connexion" class="nav-link nav-cta" id="boutonconnexion">Connexion</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container container-sm">
      <h1 class="page-title">Topic</h1>

      <article id="topic-container" class="auth-card" style="padding: 20px; margin-bottom: 20px">
        <header class="topic-header">
          <div id="topic-meta" class="topic-card-meta" style="margin-bottom: 12px"></div>

          <h2 id="topic-title" class="topic-card-title" style="margin: 0 0 12px; font-size: 1.6rem">
            Titre du topic
          </h2>

          <div id="topic-info" class="topic-card-info" style="margin-bottom: 14px"></div>
        </header>

        <section id="topic-body" class="topic-content"
          style="color: var(--muted); line-height: 1.6; margin-bottom: 18px"></section>

            <div style="display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-overlay, #1e1e24); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border, #333);">

        <form class="search-form" style="margin: 0; display: flex; gap: 10px; width: 40%;">
          <input class="search-input" id="search-input" type="text" placeholder="Rechercher un topic..." style="width: 100%;" />
          <button class="btn btn-primary" id="btn-rechercher">Rechercher</button>
        </form>

        <div style="display: flex; gap: 20px; align-items: center;">
          <div style="display: flex; gap: 8px;">
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('')">Tous</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('1')">Film</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('2')">Série</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('3')">Anime</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('4')">Question</button>
          </div>

        <div class="topic-likes" style="display: flex; gap: 10px; align-items: center; margin: 15px 0;">
          <button id="btn-like" class="btn btn-primary" onclick="envoyerVote(1)">👍 Like</button>

          <strong id="topic-score" style="font-size: 1.2rem;">0</strong>

          <button id="btn-dislike" class="btn btn-ghost" onclick="envoyerVote(-1)">👎 Dislike</button>
        </div>
        <footer class="topic-actions" style="display: flex; gap: 12px; align-items: center">
          <a href="/create-topic" class="btn btn-primary">Répondre</a>
          <button id="topic-report" class="btn btn-ghost">Signaler</button>
        </footer>
      </article>

      <section id="comments-section">
        <h3 style="margin: 0 0 12px">Réponses</h3>

        <div id="comments-list" class="topics-list"></div>

        <form id="new-reply-form" class="search-form" style="margin-top: 18px">
          <textarea id="reply-text" rows="4" placeholder="Écrire une réponse..." style="
                flex: 1;
                resize: vertical;
                padding: 12px;
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.06);
                background: transparent;
                color: var(--text);
              "></textarea>
          <div style="display: flex; gap: 8px; margin-top: 8px">
            <button type="submit" class="btn btn-primary" id="boutonPublier">
              Publier la réponse
            </button>
            <button type="button" id="reply-cancel" class="btn btn-ghost">
              Annuler
            </button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="logo">
        <img src="/assets/lounge-transparent.png" alt="Le Lounge" style="height: 60px; width: auto" />
      </div>
      <div>© 2026 Forum Ynov</div>
    </div>
  </footer>

  <script src="/script/main.js"></script>
  <script src="/script/topic.js"></script>
</body>

</html>
