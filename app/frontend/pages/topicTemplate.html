<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Le Lounge - Topic</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="logo">
          <img
            src="/assets/lounge-banner.png"
            alt="Le Lounge"
            style="height: 60px; width: auto"
          />
        </a>

        <nav class="main-nav">
          <a
            href="/admin"
            class="nav-link nav-cta"
            id="btn-nav-admin"
            style="display: none"
            >Admin</a
          >
          <a href="/" class="nav-link">Accueil</a>
          <a href="/help" class="nav-link">Aide</a>
          <a href="/connexion" class="nav-link nav-cta" id="boutonconnexion"
            >Connexion</a
          >
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="container container-sm">
        <article
          id="topic-container"
          style="
            background-color: var(--bg-overlay, #1e1e24);
            border: 1px solid var(--border, #333);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
          "
        >
          <header
            class="topic-header"
            style="
              border-bottom: 1px solid var(--border, #333);
              padding-bottom: 15px;
              margin-bottom: 20px;
            "
          >
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
              "
            >
              <div
                id="topic-meta-tags"
                style="display: flex; gap: 10px; align-items: center"
              >
                <span class="badge badge-open">Ouvert</span>
              </div>
              <div
                id="topic-info"
                style="color: var(--text-dim, #888); font-size: 0.9em"
              ></div>
            </div>

            <h1
              id="topic-title"
              style="margin: 0; font-size: 2rem; color: #fff"
            >
              Chargement du titre...
            </h1>
          </header>

          <section
            id="topic-body"
            style="
              color: #ccc;
              line-height: 1.8;
              font-size: 1.1rem;
              margin-bottom: 30px;
            "
          >
            Chargement du contenu...
          </section>

          <footer
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              background: rgba(0, 0, 0, 0.2);
              padding: 15px;
              border-radius: 8px;
            "
          >
            <div
              class="topic-likes"
              style="display: flex; gap: 15px; align-items: center"
            >
              <button
                id="btn-like"
                class="btn btn-primary"
                onclick="envoyerVote(1)"
                style="padding: 8px 15px"
              >
                👍 Like
              </button>
              <strong
                id="topic-score"
                style="
                  font-size: 1.4rem;
                  color: #fff;
                  min-width: 30px;
                  text-align: center;
                "
                >0</strong
              >
              <button
                id="btn-dislike"
                class="btn btn-ghost"
                onclick="envoyerVote(-1)"
                style="padding: 8px 15px"
              >
                👎 Dislike
              </button>
            </div>

            <div class="topic-actions" style="display: flex; gap: 10px">
              <a href="#new-reply-form" class="btn btn-primary">Répondre</a>
            </div>
          </footer>
        </article>

        <section id="comments-section">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 20px;
              padding-bottom: 10px;
              border-bottom: 1px solid var(--border, #333);
            "
          >
            <h3 style="margin: 0; font-size: 1.4rem">Réponses</h3>
            <select
              id="tri-messages"
              class="btn btn-ghost"
              style="
                border: 1px solid #444;
                padding: 6px 12px;
                background: transparent;
                color: #fff;
                cursor: pointer;
              "
              onchange="changerTri(this.value)"
            >
              <option value="desc" style="color: #000">
                Plus récents en premier
              </option>
              <option value="asc" style="color: #000">
                Plus anciens en premier
              </option>
            </select>
          </div>

          <div
            id="comments-list"
            style="display: flex; flex-direction: column; gap: 15px"
          ></div>

          <form
            id="new-reply-form"
            style="
              margin-top: 30px;
              background-color: var(--bg-overlay, #1e1e24);
              border: 1px solid var(--border, #333);
              border-radius: 12px;
              padding: 20px;
            "
          >
            <h4 style="margin: 0 0 15px 0">Ajouter une réponse</h4>
            <textarea
              id="reply-text"
              rows="4"
              placeholder="Écrire une réponse polie et constructive..."
              style="
                width: 100%;
                resize: vertical;
                padding: 15px;
                border-radius: 8px;
                border: 1px solid var(--border, #444);
                background: rgba(0, 0, 0, 0.2);
                color: var(--text, #fff);
                margin-bottom: 15px;
                font-family: inherit;
                box-sizing: border-box;
              "
            ></textarea>

            <div style="display: flex; gap: 10px; justify-content: flex-end">
              <button
                type="button"
                id="reply-cancel"
                class="btn btn-ghost"
                onclick="document.getElementById('reply-text').value = ''"
              >
                Annuler
              </button>
              <button type="submit" class="btn btn-primary" id="boutonPublier">
                Publier la réponse
              </button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="logo">
          <img
            src="/assets/lounge-transparent.png"
            alt="Le Lounge"
            style="height: 60px; width: auto"
          />
        </div>
        <div>© 2026 Forum Ynov</div>
      </div>
    </footer>

    <script src="/script/main.js"></script>
    <script src="/script/topic.js"></script>
  </body>
</html>
