<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Le Lounge - Topics</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <img src="/assets/lounge-banner.png" alt="Le Lounge" style="height: 60px; width: auto" />
      </a>

      <nav class="main-nav">
        <a href="/" class="nav-link">Accueil</a>
        <a href="/topics" class="nav-link">Topics</a>
        <a href="/help" class="nav-link">Aide</a>
        <a href="/connexion" class="nav-link nav-cta" id="boutonconnexion">Connexion</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      <h1 class="page-title">Tous les topics</h1>
      <div class="tri-container" style="margin-bottom: 20px; text-align: right;">
        <select id="tri-topics" class="btn btn-ghost" onchange="changerTriTopics(this.value)">
          <option value="desc">Plus récents en premier</option>
          <option value="likes">Les plus populaires (Likes)</option>
        </select>
      </div>
      <div class="filters-bar">
        <form class="search-form">
          <input class="search-input" id="search-input" type="text" placeholder="Rechercher un topic..." />
          <button class="btn btn-primary" id="btn-rechercher">Rechercher</button>
        </form>

        <div class="tag-filter">
          <span class="tag tag-active">Tous</span>
          <span class="tag">Séries</span>
          <span class="tag">Films</span>
          <span class="tag">Animes</span>
        </div>
      </div>

      <section class="topics-list" id="topics-list"></section>

      <div class="pagination">
        <button class="btn btn-ghost btn-sm">←</button>
        <span class="pagination-info">Page 1</span>
        <button class="btn btn-ghost btn-sm">→</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="logo">
        <img src="/assets/lounge-transparent.png" alt="Le Lounge" style="height: 60px; width: auto" />
      </div>
      <div>© 2026 Forum Ynov</div>
    </div>
  </footer>
  <script src="/script/main.js"></script>
  <script src="/script/topic.js"></script>
</body>

</html>
