<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Le Lounge - Aide</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="logo">
          <img
            src="/assets/lounge-banner.png"
            alt="Le Lounge"
            style="height: 60px; width: auto"
          />
        </a>

        <nav class="main-nav">
          <a href="/" class="nav-link">Accueil</a>
          <a href="/topics" class="nav-link">Topics</a>
          <a href="/help" class="nav-link">Aide</a>
          <a href="/connexion" class="nav-link nav-cta" id="boutonconnexion"
            >Connexion</a
          >
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="container">
        <h1 class="page-title">Centre d'aide</h1>

        <section class="topics-list">
          <div class="topic-card">
            <div class="topic-card-body">
              <div class="topic-card-title">Comment créer un topic ?</div>
              <div class="topic-card-info">
                Connecte-toi puis clique sur “Créer un topic”.
              </div>
            </div>
          </div>

          <div class="topic-card">
            <div class="topic-card-body">
              <div class="topic-card-title">
                Comment répondre à un message ?
              </div>
              <div class="topic-card-info">
                Ouvre un topic et utilise la zone de réponse en bas.
              </div>
            </div>
          </div>

          <div class="topic-card">
            <div class="topic-card-body">
              <div class="topic-card-title">Problème de connexion</div>
              <div class="topic-card-info">
                Vérifie ton mot de passe ou réinitialise-le.
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

      <div style="display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-overlay, #1e1e24); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border, #333);">

        <form class="search-form" style="margin: 0; display: flex; gap: 10px; width: 40%;">
          <input class="search-input" id="search-input" type="text" placeholder="Rechercher un topic..." style="width: 100%;" />
          <button class="btn btn-primary" id="btn-rechercher">Rechercher</button>
        </form>

        <div style="display: flex; gap: 20px; align-items: center;">
          <div style="display: flex; gap: 8px;">
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('')">Tous</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('1')">Film</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('2')">Série</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('3')">Anime</button>
            <button class="btn tag" style="border: 1px solid #444; border-radius: 20px; padding: 5px 12px; background: transparent; color: #fff; cursor: pointer;" onclick="filtrerParTag('4')">Question</button>
          </div>


    <footer class="site-footer">
      <div class="footer-inner">
        <div class="logo">
          <img
            src="/assets/lounge-transparent.png"
            alt="Le Lounge"
            style="height: 60px; width: auto"
          />
        </div>
        <div>© 2026 Forum Ynov</div>
      </div>
    </footer>
    <script src="/script/main.js"></script>
  </body>
</html>
