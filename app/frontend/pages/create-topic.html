<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Créer un topic - Le Lounge</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="logo">
          <img
            src="/assets/lounge-banner.png"
            alt="Le Lounge"
            style="height: 60px; width: auto"
          />
        </a>

        <nav class="main-nav">
          <a href="/" class="nav-link">Accueil</a>
          <a href="/topics" class="nav-link">Topics</a>
          <a href="/help" class="nav-link">Aide</a>
          <a href="/connexion" class="nav-link nav-cta" id="boutonconnexion"
            >Se connecter / S'inscrire</a
          >
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="container container-sm">
        <section class="hero">
          <h1 class="hero-title">
            Créer un <span class="hero-accent">Topic</span>
          </h1>
          <p class="hero-sub">Partage ton idée avec la communauté du Lounge.</p>
        </section>

        <form
          class="topic-form"
          style="
            background-color: var(--bg-overlay, #1e1e24);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border, #333);
          "
        >
          <div class="form-group" style="margin-bottom: 20px">
            <label
              style="
                display: block;
                margin-bottom: 8px;
                font-weight: bold;
                color: #fff;
              "
              >Titre du topic <span style="color: #ff4d4d">*</span></label
            >
            <input
              type="text"
              placeholder="Ex : Vous pensez quoi de cette série/film ?"
              id="titreTopic"
              style="
                width: 100%;
                padding: 12px;
                border-radius: 8px;
                border: 1px solid #444;
                background: rgba(0, 0, 0, 0.2);
                color: #fff;
                box-sizing: border-box;
              "
            />
            <span
              class="form-hint"
              style="
                font-size: 0.85em;
                color: #888;
                display: block;
                margin-top: 5px;
              "
              >Sois clair et précis pour attirer des réponses.</span
            >
          </div>

          <div class="form-group" style="margin-bottom: 20px">
            <label
              style="
                display: block;
                margin-bottom: 8px;
                font-weight: bold;
                color: #fff;
              "
              >Contenu <span style="color: #ff4d4d">*</span></label
            >
            <textarea
              rows="8"
              placeholder="Décris ton sujet..."
              id="contenuTopic"
              style="
                width: 100%;
                padding: 12px;
                border-radius: 8px;
                border: 1px solid #444;
                background: rgba(0, 0, 0, 0.2);
                color: #fff;
                resize: vertical;
                box-sizing: border-box;
              "
            ></textarea>
            <span
              class="form-hint"
              style="
                font-size: 0.85em;
                color: #888;
                display: block;
                margin-top: 5px;
              "
              >Décris ton sujet en détail pour encourager les discussions.</span
            >
          </div>

          <div class="form-group" style="margin-bottom: 30px">
            <label
              style="
                display: block;
                margin-bottom: 10px;
                font-weight: bold;
                color: #fff;
              "
              >Tags <span style="color: #ff4d4d">*</span></label
            >
            <div
              class="tags-container"
              style="display: flex; gap: 15px; flex-wrap: wrap"
            >
              <label
                class="tag-checkbox"
                style="
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  gap: 5px;
                "
              >
                <input type="radio" name="idTag" value="1" checked />
                <span class="tag">Film</span>
              </label>
              <label
                class="tag-checkbox"
                style="
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  gap: 5px;
                "
              >
                <input type="radio" name="idTag" value="2" />
                <span class="tag">Série</span>
              </label>
              <label
                class="tag-checkbox"
                style="
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  gap: 5px;
                "
              >
                <input type="radio" name="idTag" value="3" />
                <span class="tag">Anime</span>
              </label>
              <label
                class="tag-checkbox"
                style="
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  gap: 5px;
                "
              >
                <input type="radio" name="idTag" value="4" />
                <span class="tag">Question</span>
              </label>
            </div>
          </div>

          <div class="form-actions">
            <button
              type="button"
              class="btn btn-primary"
              id="boutonPublier"
              style="
                width: 100%;
                padding: 12px;
                font-size: 1.1rem;
                cursor: pointer;
              "
            >
              Publier le topic
            </button>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="logo">
          <img
            src="/assets/lounge-transparent.png"
            alt="Le Lounge"
            style="height: 60px; width: auto"
          />
        </div>
        <div>© 2026 Forum Ynov</div>
      </div>
    </footer>
    <script src="/script/main.js"></script>
    <script src="/script/topic.js"></script>
  </body>
</html>
