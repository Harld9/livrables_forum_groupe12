<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Créer un topic - Le Lounge</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <img src="/assets/lounge-banner.png" alt="Le Lounge" style="height: 60px; width: auto" />
      </a>

      <nav class="main-nav">
        <a href="/" class="nav-link">Accueil</a>
        <a href="/topics" class="nav-link">Topics</a>
        <a href="/help" class="nav-link">Aide</a>
        <a href="/connexion" class="nav-link nav-cta" id="boutonconnexion">Se connecter / S'inscrire</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container container-sm">
      <section class="hero">
        <h1 class="hero-title">
          Créer un <span class="hero-accent">Topic</span>
        </h1>
        <p class="hero-sub">Partage ton idée avec la communauté du Lounge.</p>
      </section>

      <form class="topic-form">
        <div class="form-group">
          <label>Titre du topic <span class="required">*</span></label>
          <input type="text" placeholder="Ex : Vous pensez quoi de cette série/film ?" id="titreTopic" />
          <span class="form-hint">Sois clair et précis pour attirer des réponses.</span>
        </div>

        <div class="form-group">
          <label>Contenu <span class="required">*</span></label>
          <textarea rows="8" placeholder="Décris ton sujet..." id="contenuTopic"></textarea>
          <span class="form-hint">Décris ton sujet en détail pour encourager les discussions.</span>
        </div>

        <div class="form-group">
          <label>Tags <span class="required">*</span></label>
          <div class="tags-container" style="display: flex; gap: 15px; margin-top: 10px;">
            <label class="tag-checkbox" style="cursor: pointer;">
              <input type="radio" name="idTag" value="1" checked>
              <span class="tag">Film</span>
            </label>
            <label class="tag-checkbox" style="cursor: pointer;">
              <input type="radio" name="idTag" value="2">
              <span class="tag">Série</span>
            </label>
            <label class="tag-checkbox" style="cursor: pointer;">
              <input type="radio" name="idTag" value="3">
              <span class="tag">Anime</span>
            </label>
            <label class="tag-checkbox" style="cursor: pointer;">
              <input type="radio" name="idTag" value="4">
              <span class="tag">Question</span>
            </label>
          </div>
        </div>

        <div class="form-actions" style="margin-top: 30px;">
          <button type="button" class="btn btn-primary" id="boutonPublier">
            Publier le topic
          </button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="logo">
        <img src="/assets/lounge-transparent.png" alt="Le Lounge" style="height: 60px; width: auto" />
      </div>
      <div>© 2026 Forum Ynov</div>
    </div>
  </footer>
  <script src="/script/main.js"></script>
  <script src="/script/topic.js"></script>
</body>

</html>
