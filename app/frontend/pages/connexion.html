<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Lounge - Auth</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <div class="logo">
            <img src="/assets/lounge-banner.png" alt="Le Lounge" style="height: 60px; width: auto;">
        </div>

        <nav class="main-nav">
            <a href="/" class="nav-link">Accueil</a>
            <a href="/topics" class="nav-link">Topics</a>
            <a href="/help" class="nav-link">Aide</a>
            <a href="/connexion" class="nav-link nav-cta">Connexion</a>
        </nav>
    </div>
</header>

<main class="auth-wrapper">

    <div class="auth-deco">
        <div class="deco-blob deco-1"></div>
        <div class="deco-blob deco-2"></div>
    </div>

    <div class="auth-card">
        <div class="logo">
    <img src="/assets/lounge-bannerblack.png" alt="Le Lounge" style="height: 70px; width: auto;">
</div>

        <p class="auth-sub">Connecte-toi ou crée un compte</p>

        <!-- LOGIN -->
        <form id="formConnexion" class="auth-form">
            <div class="form-group">
                <label>Nom d'utilisateur ou email</label>
                <input type="text" placeholder="Pseudo ou email" id="email">
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••" id="mdp">
            </div>

            <p id="boiteMessage" class="message-erreur" style="display: none;"></p>

            <button class="btn btn-primary btn-full">Se connecter</button>
        </form>

        <div class="auth-footer">
            Pas de compte ? <a href="/inscription">S'inscrire</a>
        </div>

    </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="logo">
    <img src="/assets/lounge-transparent.png" alt="Le Lounge" style="height: 60px; width: auto;">
</div>
        <div>© 2026 Forum Ynov</div>
    </div>
</footer>
<script src="/script/connexion.js"></script>
</body>
</html>
