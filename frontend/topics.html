<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Lounge - Topics</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <div class="logo">
            <span class="logo-dot"></span>
            LE LOUNGE
        </div>

        <nav class="main-nav">
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="topics.html" class="nav-link">Topics</a>
            <a href="help.html" class="nav-link">Aide</a>
            <a href="auth.html" class="nav-link nav-cta">Connexion</a>
        </nav>
    </div>
</header>

<main class="site-main">
    <div class="container">

        <h1 class="page-title">Tous les topics</h1>

        <!-- SEARCH -->
        <div class="filters-bar">
            <form class="search-form">
                <input class="search-input" type="text" placeholder="Rechercher un topic...">
                <button class="btn btn-primary">Rechercher</button>
            </form>

            <div class="tag-filter">
                <span class="tag tag-active">Tous</span>
                <span class="tag">Séries</span>
                <span class="tag">Films</span>
                <span class="tag">Animes</span>
            </div>
        </div>

        <!-- LIST -->
        <section class="topics-list">

            <div class="topic-card">
                <div class="topic-card-num">#1</div>

                <div class="topic-card-body">
                    <div class="topic-card-meta">
                        <span class="badge badge-open">Ouvert</span>
                        <span class="tag tag-sm">Films</span>
                    </div>

                    <div class="topic-card-title">
                        <a href="#">Meilleur film 2026 selon vous ?</a>
                    </div>

                    <div class="topic-card-info">
                        <span>par Alex</span>
                        <span class="sep">•</span>
                        <span>Aujourd'hui</span>
                    </div>
                </div>

                <div class="topic-card-arrow">→</div>
            </div>

        </section>

        <!-- PAGINATION -->
        <div class="pagination">
            <button class="btn btn-ghost btn-sm">←</button>
            <span class="pagination-info">Page 1</span>
            <button class="btn btn-ghost btn-sm">→</button>
        </div>

    </div>
</main>

</body>
</html>
